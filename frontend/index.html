<!DOCTYPE html>
<html>
<head>
    <title>Log Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            background: #111827;
            color: #38bdf8;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            padding: 20px;
            border-radius: 10px;
            width: 150px;
            text-align: center;
        }

        .info { background: #1e293b; }
        .warning { background: #f59e0b; }
        .error { background: #ef4444; }

        canvas {
            max-width: 600px;
            margin: auto;
            display: block;
        }

        #logs {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: scroll;
            background: #111827;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>🚀 Log Monitoring Dashboard</header>

<div class="container">

    <div class="cards" id="stats"></div>

    <canvas id="chart"></canvas>

    <div id="logs"></div>

</div>

<script>
let chart;

async function fetchData() {
    try {
        const statsRes = await fetch("http://localhost:8000/stats");
        const logsRes = await fetch("http://localhost:8000/logs");

        const stats = await statsRes.json();
        const logs = await logsRes.json();

        // --- Cards ---
        let html = "";
        let labels = [];
        let data = [];

        stats.forEach(s => {
            let cls = "info";
            if (s[0] === "ERROR") cls = "error";
            if (s[0] === "WARNING") cls = "warning";

            html += `
                <div class="card ${cls}">
                    <h3>${s[0]}</h3>
                    <p>${s[1]}</p>
                </div>
            `;

            labels.push(s[0]);
            data.push(s[1]);
        });

        document.getElementById("stats").innerHTML = html;

        // --- Chart ---
        const ctx = document.getElementById("chart");

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Log Count",
                    data: data
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: "white" }
                    }
                },
                scales: {
                    x: { ticks: { color: "white" } },
                    y: { ticks: { color: "white" } }
                }
            }
        });

        // --- Logs ---
        document.getElementById("logs").innerHTML =
            logs.map(l => `<p>• ${JSON.stringify(l)}</p>`).join("");

    } catch (err) {
        console.error("Frontend error:", err);
    }
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
